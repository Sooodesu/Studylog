{% extends 'logs/base.html' %}

{% block content %}

<h1 class="mb-4">
    学習ログ一覧
</h1>

<a href="/logs/create/" class="btn btn-primary mb-3">
    新規作成
</a>

{% for log in logs %}

<div class="card mb-3">

    <div class="card-body">

        <h3 class="card-title">
            {{ log.title }}
        </h3>

        <p class="card-text">
            {{ log.content }}
        </p>

        <small class="text-muted">
            {{ log.study_date }}
        </small>

        <hr>

        <a
            href="/logs/update/{{ log.id }}/"
            class="btn btn-warning"
        >
            編集
        </a>

        <a
            href="/logs/delete/{{ log.id }}/"
            class="btn btn-danger"
        >
            削除
        </a>

    </div>

</div>

{% endfor %}

{% endblock %}
