{% extends 'logs/base.html' %}

{% block content %}

<h1 class="mb-4">
    学習ログ一覧
</h1>

<a href="/logs/create/" class="btn btn-primary mb-3">
    新規作成
</a>

{% for log in logs %}

<div class="card mb-3">

    <div class="card-body">

        <h3 class="card-title">
            {{ log.title }}
        </h3>

        <p class="card-text">
            {{ log.content }}
        </p>

        <small class="text-muted">
            {{ log.study_date }}
        </small>

        <hr>

        <a
            href="/logs/update/{{ log.id }}/"
            class="btn btn-warning"
        >
            編集
        </a>

        <a
            href="/logs/delete/{{ log.id }}/"
            class="btn btn-danger"
        >
            削除
        </a>

    </div>

</div>

<form method="GET" class="mb-3">
    <div class="form-group">
        <label for="tag">タグで絞り込み:</label>
        <select name="tag" id="tag" class="form-control">
            <option value="">すべて</option>
            {% for tag in tags %}
                <option value="{{ tag.id }}" {% if request.GET.tag == tag.id|stringformat:"s" %}selected{% endif %}>
                    {{ tag.name }}
                </option>
            {% endfor %}
        </select>
    </div>
    <button type="submit" class="btn btn-outline-primary">絞り込み</button>
</form>

{% endfor %}

{% endblock %}
