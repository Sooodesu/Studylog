{% extends 'logs/base.html' %}

{% block content %}

<h1 class="mb-4">
    タグ一覧
</h1>

<a
    href="/logs/tags/create/"
    class="btn btn-primary mb-3"
>
    タグ追加
</a>

{% for tag in tags %}

<div class="card mb-2">

    <div class="card-body">

        <h3>
            {{ tag.name }}
        </h3>

        <a
            href="/logs/tags/update/{{ tag.id }}/"
            class="btn btn-warning"
        >
            編集
        </a>

        <a
            href="/logs/tags/delete/{{ tag.id }}/"
            class="btn btn-danger"
        >
            削除
        </a>

    </div>

</div>

{% endfor %}

{% endblock %}
