{% extends 'logs/base.html' %}

{% block content %}

<h1 class="mb-4">
    学習ログ作成
</h1>

<div class="card">

    <div class="card-body">

        <form method="POST">

            {% csrf_token %}

            {{ form.as_p }}

            <button
                type="submit"
                class="btn btn-primary"
            >
                保存
            </button>

        </form>

    </div>

</div>

{% endblock %}
